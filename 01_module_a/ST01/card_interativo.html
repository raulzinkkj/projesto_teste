<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Estilização global para todos elemntos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estilização do corpo da página */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #4f4f4f 0%, #8a8a8a 55%, #c2c2c2 100%);
        }

        /* Estilização do card */
        .card {
            width: 320px;
            height: 450px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: column;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: radial-gradient(circle, #c2c2c2 0%, #8a8a8a 55%, #4f4f4f 100%);
            text-align: center;
            overflow: hidden;
            box-shadow: 5px, 5px, 10px, rgba(0, 0, 0, 0.5);
        }

        .card:hover img {
            transform: scale(1.8);

        }

        .card:hover strong {
            color: white;
        }

        .card:hover button {
            transform: translateY(-1px);
        }

        /* Estilização do titulo */
        h2 {
            font-size: 2.5rem;
            margin-top: 10px;
            z-index: 000;
            color: #e9e8e8;
            filter: drop-shadow(5px 5px 10px rgba(0, 0, 0, 0.5));
        }

        /* Estilização da imagem */
        img {
            width: 300px;
            z-index: 999;
            position: relative;
            left: 0;
            top: 0;
            transition: 0.3s;
            filter: drop-shadow(5px 5px 10px rgba(0, 0, 0, 0.5));
        }

        .descricao {
            margin-bottom: 5px;
            transition: 0.3s;
        }
        
        strong {
            font-size: 2rem;
        }

        /* Estilizar o botão */
        button { 
            width: 100%;
            height: 30px;
            border-radius: 5px;
            border: none;
            background: #c2c2c2, 50%;
            color: #4f4f4f;
            font-weight: bold;
            transition: 0.3s;
            transform: translateY(60px);
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }

        /* Edita a imagem do botão */
        button img {
            width: 15px;
        }
    </style>
</head>

<body>
    <div class="card"> <!--Div pai-->
        <h2>Asycs Gel Nyc</h2> <!--Titulo da página-->
        <img src="img/tenis.png" alt=""> <!--Imagem do produto-->
        <div class="descricao">
            <p>O ASICS GEL-NYC é um tênis que une estilo retrô e conforto moderno.</p>
            <strong>R$ 900,00</strong>
        </div>
        <button>Adicionar ao Carrinho <img src="img/cart-plus-solid-full.svg" alt=""></button>
    </div>
</body>

</html>
